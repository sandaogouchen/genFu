server:
  port: 8080
pg:
  dsn: "file:genfu.db?_foreign_keys=on"
  max_open_conns: 10
  max_idle_conns: 10
  conn_max_lifetime: "30m"
llm:
  endpoint: "https://aihubmix.com/v1/"
  api_key: "sk-x"
  model: "gemini-3-flash-preview"
  # endpoint: "http://localhost:8317/v1/chat/completions/"
  # api_key: "sk-sw4heaw39usffnoaw9"
  # model: "gpt5.3-codex"

  timeout: "600s"
  temperature: 0.2
  retry_count: 2
  retry_delay: "300ms"
  hedge_delay: "1500ms"
  max_inflight: 4
embedding:
  provider: "openai"
  api_key: "sk-sw4heaw39usffnoaw9"
  #model: "text-embedding-3-small"
  model: "text-embedding-3-small"
  base_url: "http://localhost:8317/v1/chat/completions/"
  timeout: "30s"
eastmoney:
  # uTLS 请求超时
  timeout: "15s"
  # 每次请求外层重试次数
  max_retries: 3
  # 连续请求最小间隔
  min_interval: "200ms"
  # 默认 Referer
  referer: "https://quote.eastmoney.com/center/gridlist.html"
  # 默认 User-Agent (Chrome 120)
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
rsshub:
  base_url: "http://localhost:1200"
  routes:
    - "/eastmoney/search/科技"
    - "/eastmoney/search/财经"
    - "/eastmoney/search/股票"
  poll_interval: "1m"
  max_items: 20
  timeout: "10s"
news:
  account_id: 1
  brief_limit: 20
  keywords: []
  pipeline_enabled: true
  pipeline:
    pre_market_time: "08:30"
    intraday_interval: "30m"
    trading_start: "09:30"
    trading_end: "15:00"
    lookback_duration: "72h"
    event_impact_enabled: true
    causal_verifier_enabled: true
    event_impact_batch_size: 10
    verifier_max_analyze: 5
    verifier_weak_threshold: 0.6
    verifier_invalid_threshold: 0.4
decision:
  max_single_order_ratio: 0.20
  max_symbol_exposure_ratio: 0.30
  max_daily_trade_ratio: 0.40
  min_confidence: 0.55
next_open:
  enabled: true
  hour: 19
  minute: 30
  account_id: 1
  news_limit: 10
access:
  enabled: false
  api_keys:
    - "sk-sw4heaw39usffnoaw9"
  allow_paths:
    - "/healthz"
    - "/docs"
    - "/openapi.json"
